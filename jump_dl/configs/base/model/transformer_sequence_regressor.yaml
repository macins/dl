model:
  name: transformer_panel_regressor
  target_key: ret_30min

  head:
    name: increment_path
    target_key: ret_30min
    num_horizons: 4
    path_key: path
    use_layer_norm: true

    
  backbone:
    name: transformer_sequence
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
    num_heads: 8
    causal: true
    position_encoding: alibi

    attention_projection_sharing: v
      
    sublayers:
      - type: attention
      
      - type: temporal_gru
        gru_hidden_size: 384
        gru_num_layers: 1
        output_zero_init: true
        
      - type: moe_ffn
        ffn_hidden_size: 384
    use_register_tokens: true
    num_register_tokens: 4
    register_axis: symbol
    return_register_tokens: false

  numeric_feature_groups: [continuous]
  categorical_cols: []
  hidden_size: 256
  num_layers: 2
  dropout: 0.1
  target_key: ret_30min
  num_heads: 8
  ffn_hidden_size: 512
  ffn_activation: swiglu
  norm_type: rmsnorm
  norm_eps: 1.0e-6
  residual_scale: 1.0
  qk_norm: true
  attention_gate: true
  max_seq_len: 4096
  position_encoding: rope
  causal: true
  use_moe: false
  num_experts: 8
  top_k: 2
  aux_loss_weight: 1.0e-2
  router_z_loss_weight: 0
  shared_experts: 0

  symbol_query_decoder:
    enabled: false
    mode: full_causal
    num_heads: 4
    dropout: 0.0
    residual_init: 0.0
    use_symbol_embedding: true
    num_symbols: null
    use_layer_norm: true
    exclude_self: false
    add_lag_bias: false
    max_lag: null
    topk_indices_path: null
    topk_indices: null
    topk_k: null
    memory_pooling: mean
    cross_gate: true
