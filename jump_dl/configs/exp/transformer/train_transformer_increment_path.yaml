inherits:
  - ../../base/common/runtime.yaml
  - ../../base/objective/cosine_regression.yaml
  - ../../base/data/day_dataset.yaml
  - ../../base/data/train_val_split_2013_2019.yaml
  - ../../base/model/transformer_sequence_regressor.yaml
  - ../../base/optimizer/adamw.yaml
  - ../../base/scheduler/cosine_60.yaml
  - ../../base/trainer/default.yaml

data:
  train_dataloader:
    shuffle: false

output_dir: workdirs/jump_dl/transformer_increment_path

model:
  name: transformer_panel_regressor
  target_key: ret_30min

  head:
    name: increment_path
    target_key: ret_30min
    num_horizons: 4
    path_key: path
    use_layer_norm: true

    
  backbone:
    name: transformer_sequence
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
    num_heads: 8
    causal: true
    position_encoding: alibi

    attention_projection_sharing: v
    
    sublayers:
      - type: attention
      
      - type: temporal_gru
        gru_hidden_size: 384
        gru_num_layers: 1
        output_zero_init: true
        
      - type: moe_ffn
        ffn_hidden_size: 384
    use_register_tokens: true
    num_register_tokens: 4
    register_axis: symbol
    return_register_tokens: false
    
objective:
  name: cosine_similarity
  pred_key: ret_30min
  target_key: ret_30min
  target_inc_keys:
    - ret_5min
    - ret_10min
    - ret_25min
    - ret_25_30min
  aux_cum_huber_weight: 0.0
  aux_inc_huber_weight: 0.0
  aux_huber_delta: 0.5
  aux_horizon_weights: [0.8, 1.0, 1.2, 1.4]

  loss_weights:
    cos: 1.0
    mse: 0.0
    mog_nll: 0.0
    usage_kl: 0.0
    scale_reg: 0.0
    aux: 1.0

data:
  dataset:
    target_cols:
      - ret_5min
      - ret_10min
      - ret_30min
      - ret_25min
      - ret_25_30min
