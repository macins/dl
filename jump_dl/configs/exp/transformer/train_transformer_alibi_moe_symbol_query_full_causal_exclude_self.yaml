inherits:
  - ../../base/common/runtime.yaml
  - ../../base/objective/cosine_regression.yaml
  - ../../base/data/shared_dataset.yaml
  - ../../base/data/train_val_split_2013_2019.yaml
  - ../../base/loader/train_gpu.yaml
  - ../../base/loader/val_gpu.yaml
  - ../../base/model/transformer_sequence_regressor.yaml
  - ../../base/optimizer/adamw.yaml
  - ../../base/scheduler/cosine_60.yaml
  - ../../base/trainer/default.yaml

output_dir: workdirs/jump_dl/transformer_alibi_moe_symbol_query_full_causal_exclude_self

model:
  symbol_query_decoder:
    enabled: true
    mode: full_causal
    num_heads: 4
    dropout: 0.0
    residual_init: 0.0
    use_symbol_embedding: true
    use_layer_norm: true
    exclude_self: true
    add_lag_bias: false
