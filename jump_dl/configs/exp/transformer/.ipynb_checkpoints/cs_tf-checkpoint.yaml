inherits:
  - ../../base/common/runtime.yaml
  - ../../base/objective/cosine_regression.yaml
  - ../../base/data/day_dataset.yaml
  - ../../base/data/train_val_split_2013_2019.yaml
  - ../../base/model/transformer_sequence_regressor.yaml
  - ../../base/optimizer/adamw.yaml
  - ../../base/scheduler/cosine_60.yaml
  - ../../base/trainer/default.yaml

output_dir: workdirs/jump_dl/transformer_alibi

model:
  name: transformer_panel_regressor

  hidden_size: 256
  num_layers: 1
  dropout: 0.1
  target_key: ret_30min

  encoder:
    model_dim: 256

  backbone:
    name: transformer_sequence
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
    num_heads: 8
    causal: true
    position_encoding: alibi
    sublayers:
      - type: attention
      - type: cross_symbol_attention
      - type: ffn
        ffn_hidden_size: 384
    use_register_tokens: true
    num_register_tokens: 4
    register_axis: symbol
    return_register_tokens: false

  head:
    name: sequence_mog_regression
    input_dim: 256
    target_key: ret_30min
    output_dim: 1
    num_components: 2
    use_layer_norm: true
    shared_mean: false
    scale_init: [1.0, 0.0]

objective:
  name: cosine_similarity
  pred_key: ret_30min
  target_key: ret_30min

  sigma_floor: 1.0e-4
  sigma_max: 20.0

  loss_weights:
    cos: 0.0
    mse: 0.0
    mog_nll: 0.0
    usage_kl: 0.000
    scale_reg: 0.0

  loss_schedules:
    cos:
      by: step
      mode: cosine
      start_step: 0
      end_step: 0
      start_weight: 1.0
      end_weight: 1.0

    mse:
      by: step
      mode: linear
      start_step: 0
      end_step: 0
      start_weight: 0.0
      end_weight: 0.0

    mog_nll:
      by: step
      mode: linear
      start_step: 0
      end_step: 1000
      start_weight: 0.0
      end_weight: 0.0
