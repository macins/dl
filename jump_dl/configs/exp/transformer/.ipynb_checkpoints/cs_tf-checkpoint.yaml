inherits:
  - ../../base/common/runtime.yaml
  - ../../base/objective/cosine_regression.yaml
  - ../../base/data/day_dataset.yaml
  - ../../base/data/train_val_split_2013_2019.yaml
  - ../../base/model/transformer_sequence_regressor.yaml
  - ../../base/optimizer/adamw.yaml
  - ../../base/scheduler/cosine_60.yaml
  - ../../base/trainer/default.yaml

output_dir: workdirs/jump_dl/transformer_alibi

model:
  name: transformer_panel_regressor

  hidden_size: 256
  num_layers: 1
  dropout: 0.1
  target_key: ret_30min

  encoder:
    model_dim: 256

  backbone:
    name: transformer_sequence
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
    num_heads: 8
    causal: true
    position_encoding: rope

    attention_projection_sharing: v
    
    sublayers:
      - type: attention
      
      - type: temporal_gru
        gru_hidden_size: 384
        gru_num_layers: 1
        output_zero_init: true

      - type: cross_symbol_attention
        
      - type: moe_ffn
        ffn_hidden_size: 384
    use_register_tokens: true
    num_register_tokens: 4
    register_axis: symbol
    return_register_tokens: false

objective:
  name: cosine_similarity
  pred_key: ret_30min
  target_key: ret_30min

  sigma_floor: 1.0e-4
  sigma_max: 20.0

  loss_weights:
    cos: 0.0
    mse: 0.0
    mog_nll: 0.0
    usage_kl: 0.000
    scale_reg: 0.0
    aux: 0.001

  loss_schedules:
    cos:
      by: step
      mode: cosine
      start_step: 0
      end_step: 0
      start_weight: 1.0
      end_weight: 1.0